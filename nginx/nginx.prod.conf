server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:10000;
        proxy_set_header Host $host;
    }
    location /detect/ {
        proxy_pass http://backend:10000;
        proxy_set_header Host $host;
    }
}
